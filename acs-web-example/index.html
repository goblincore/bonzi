<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ACS Viewer</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
        background: #1a1a1a;
        color: #fff;
      }
      h1 {
        margin-bottom: 20px;
      }
      .controls {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
        align-items: center;
      }
      input[type="file"] {
        padding: 8px;
        background: #333;
        border: 1px solid #555;
        border-radius: 4px;
        color: #fff;
      }
      select {
        padding: 8px 12px;
        background: #333;
        border: 1px solid #555;
        border-radius: 4px;
        color: #fff;
        font-size: 14px;
      }
      select:disabled {
        opacity: 0.5;
      }
      .playback-controls {
        display: flex;
        gap: 15px;
        margin-bottom: 20px;
        align-items: center;
        flex-wrap: wrap;
      }
      .playback-controls label {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
      }
      .playback-controls input[type="checkbox"] {
        width: 16px;
        height: 16px;
        cursor: pointer;
      }
      .playback-controls input[type="range"] {
        width: 100px;
        cursor: pointer;
      }
      .canvas-container {
        background: #2a2a2a;
        border: 1px solid #444;
        border-radius: 8px;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 400px;
      }
      canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        width: 100%;
        height: auto;
        max-width: 400px;
      }
      .info {
        margin-top: 20px;
        padding: 15px;
        background: #2a2a2a;
        border-radius: 8px;
        font-size: 14px;
      }
      .info p {
        margin: 5px 0;
      }
      .hidden {
        display: none;
      }
      .audio-notice {
        background: #4a3a00;
        border: 1px solid #8a7000;
        border-radius: 4px;
        padding: 8px 12px;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .audio-notice:hover {
        background: #5a4a00;
      }
      .audio-notice span {
        flex: 1;
      }

      /* ── TTS Panel ── */
      .tts-panel {
        margin-top: 20px;
        padding: 15px;
        background: #2a2a2a;
        border: 1px solid #444;
        border-radius: 8px;
      }
      .tts-panel h2 {
        margin: 0 0 12px 0;
        font-size: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .tts-status {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #555;
      }
      .tts-status.connected { background: #4caf50; }
      .tts-status.error { background: #f44336; }
      .tts-status.loading { background: #ff9800; animation: pulse 1s infinite; }
      @keyframes pulse { 50% { opacity: 0.4; } }
      .tts-row {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
        align-items: center;
      }
      .tts-row label {
        min-width: 50px;
        font-size: 13px;
        color: #aaa;
      }
      .tts-text-input {
        flex: 1;
        padding: 8px 10px;
        background: #333;
        border: 1px solid #555;
        border-radius: 4px;
        color: #fff;
        font-size: 14px;
        font-family: inherit;
      }
      .tts-text-input:focus {
        outline: none;
        border-color: #888;
      }
      .tts-btn {
        padding: 8px 16px;
        background: #4a6fa5;
        border: none;
        border-radius: 4px;
        color: #fff;
        cursor: pointer;
        font-size: 14px;
        white-space: nowrap;
      }
      .tts-btn:hover { background: #5a7fb5; }
      .tts-btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .tts-btn:active { background: #3a5f95; }
      .tts-sliders {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
        margin-bottom: 10px;
      }
      .tts-slider-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .tts-slider-group label {
        font-size: 12px;
        color: #aaa;
      }
      .tts-slider-group input[type="range"] {
        width: 100%;
        cursor: pointer;
      }
      .tts-slider-value {
        font-size: 11px;
        color: #666;
        text-align: right;
      }
      .tts-voice-row {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      .tts-voice-row select {
        flex: 1;
        min-width: 120px;
      }
      .tts-endpoint-row {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
        align-items: center;
      }
      .tts-endpoint-input {
        flex: 1;
        padding: 6px 8px;
        background: #333;
        border: 1px solid #555;
        border-radius: 4px;
        color: #888;
        font-size: 12px;
        font-family: monospace;
      }
      .tts-endpoint-input:focus {
        outline: none;
        border-color: #888;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <h1>ACS Viewer</h1>

    <div class="controls">
      <select id="agent-select">
        <option value="">Select agent...</option>
        <!-- Auto-populated from public/agents/ at startup -->
      </select>
      <span style="color: #888;">or</span>
      <input type="file" id="file-input" accept=".acs" />
      <select id="animation-select" disabled>
        <option value="">Select animation...</option>
      </select>
    </div>

    <div id="audio-notice" class="audio-notice hidden" onclick="enableAudio()">
      <span>Click to enable audio</span>
    </div>

    <div class="playback-controls">
      <label>
        <input type="checkbox" id="loop-toggle" />
        Loop
      </label>
      <label>
        <input type="checkbox" id="branch-toggle" checked />
        Branching
      </label>
      <label>
        Volume
        <input type="range" id="volume-slider" min="0" max="100" value="50" />
      </label>
    </div>

    <div class="canvas-container">
      <canvas id="canvas"></canvas>
    </div>

    <div id="info" class="info hidden">
      <p><strong>Name:</strong> <span id="char-name"></span></p>
      <p><strong>Description:</strong> <span id="char-desc"></span></p>
      <p><strong>Size:</strong> <span id="char-size"></span></p>
      <p><strong>Animations:</strong> <span id="char-anims"></span></p>
      <p><strong>Images:</strong> <span id="char-images"></span></p>
      <p><strong>Sounds:</strong> <span id="char-sounds"></span></p>
    </div>

    <!-- ── SAPI4 TTS Panel ── -->
    <div class="tts-panel" id="tts-panel">
      <h2>
        <span class="tts-status" id="tts-status"></span>
        SAPI4 Text-to-Speech
      </h2>

      <div class="tts-endpoint-row">
        <label style="font-size: 12px; color: #888;">API</label>
        <input type="text" class="tts-endpoint-input" id="tts-endpoint" value="http://localhost:8085" />
        <button class="tts-btn" id="tts-connect-btn" style="font-size: 12px; padding: 6px 10px;">Connect</button>
      </div>

      <div class="tts-voice-row">
        <label style="min-width: 50px; font-size: 13px; color: #aaa;">Voice</label>
        <select id="tts-voice-select" disabled>
          <option value="">Default (Sam)</option>
        </select>
        <label style="font-size: 13px; color: #aaa;">
          <input type="checkbox" id="tts-use-agent" /> <span id="tts-agent-label">Use loaded agent voice</span>
        </label>
      </div>

      <div class="tts-sliders">
        <div class="tts-slider-group">
          <label>Pitch <span class="tts-slider-value" id="tts-pitch-val">200</span></label>
          <input type="range" id="tts-pitch" min="50" max="500" value="200" />
        </div>
        <div class="tts-slider-group">
          <label>Speed <span class="tts-slider-value" id="tts-speed-val">150</span></label>
          <input type="range" id="tts-speed" min="50" max="400" value="150" />
        </div>
        <div class="tts-slider-group">
          <label>Gain <span class="tts-slider-value" id="tts-gain-val">4.0</span></label>
          <input type="range" id="tts-gain" min="0.5" max="10" value="4" step="0.5" />
        </div>
      </div>

      <div class="tts-row">
        <input type="text" class="tts-text-input" id="tts-text" placeholder="Type something to speak..." value="Hello, I am Bonzi Buddy, your desktop friend!" />
        <button class="tts-btn" id="tts-speak-btn" disabled>Speak</button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
